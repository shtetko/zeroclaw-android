name: Secure Android Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  build-android:
    name: Build Android (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false # တစ်ခု error တက်လည်း ကျန်တာ ဆက်လုပ်ဖို့
      matrix:
        include:
          - target: aarch64-linux-android
            arch: arm64
          - target: armv7-linux-androideabi
            arch: armv7
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      # ပြင်ဆင်လိုက်တဲ့အပိုင်း: ပိုစိတ်ချရတဲ့ Android Setup ကို သုံးထားပါတယ်
      - name: Setup Android SDK & NDK
        uses: android-actions/setup-android@v3
      
      - name: Install NDK
        run: sdkmanager "ndk;26.1.10909125" # version ကို လိုသလို ပြင်နိုင်ပါတယ်

      - name: Build Release
        run: |
          # NDK path ကို ရှာပြီး linker သတ်မှတ်ခြင်း
          export ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/26.1.10909125
          export AR=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar
          cargo build --release --target ${{ matrix.target }}

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/zeroclaw

  publish:
    name: Secure Publish
    needs: build-android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Install syft
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
      
      - name: Generate SBOM
        run: syft dir:. -o cyclonedx-json=artifacts/sbom.json

      - name: Generate Checksums
        run: |
          cd artifacts
          # ဖိုင်တွေကို folder အလိုက် ခွဲမနေအောင် ရှာပြီး checksum လုပ်တာပါ
          find . -type f -exec sha256sum {} + > SHA256SUMS

      - name: Install cosign
        uses: sigstore/cosign-installer@v3.4.0

      - name: Sign artifacts
        run: |
          # လက်မှတ်ထိုးမယ့်အပိုင်း
          find artifacts -type f ! -name '*.sig' -print0 | xargs -0 -I {} cosign sign-blob --yes --output-signature {}.sig {}
        env:
          COSIGN_EXPERIMENTAL: 1

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

